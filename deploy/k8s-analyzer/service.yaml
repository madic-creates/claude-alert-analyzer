apiVersion: v1
kind: Service
metadata:
  name: claude-alert-kubernetes-analyzer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: claude-alert-kubernetes-analyzer
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: claude-alert-kubernetes-analyzer
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9101
      targetPort: metrics
      protocol: TCP
