# Example secret — copy to secret.yaml, fill in real values, then apply.
# Do NOT commit the populated secret.yaml; this file is a template only.
#
# All container env vars are loaded from this Secret via `envFrom`, so
# every key here becomes an environment variable in the pod.
apiVersion: v1
kind: Secret
metadata:
  name: claude-alert-kubernetes-analyzer-env
  namespace: monitoring
type: Opaque
stringData:
  # --- Required ---

  # Bearer token Alertmanager must present to /webhook
  WEBHOOK_SECRET: "change-me"

  # Anthropic or OpenRouter API key
  API_KEY: "sk-ant-..."

  # --- Runtime configuration (non-secret, but loaded via envFrom) ---

  PORT: "8080"
  METRICS_PORT: "9101"
  PROMETHEUS_URL: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
  COOLDOWN_SECONDS: "300"
  ALLOWED_NAMESPACES: "monitoring,databases,media"
  MAX_LOG_BYTES: "2048"
  NTFY_PUBLISH_URL: "https://ntfy.example.com"
  NTFY_PUBLISH_TOPIC: "kubernetes-analysis"

  # --- Optional overrides ---

  # Override to point at OpenRouter or a proxy.
  # Default: https://api.anthropic.com/v1/messages
  API_BASE_URL: "https://api.anthropic.com/v1/messages"

  # Pin a specific model. Default: claude-sonnet-4-6
  CLAUDE_MODEL: "claude-sonnet-4-6"

  # ntfy auth token (leave empty if your topic is public)
  NTFY_PUBLISH_TOKEN: ""
