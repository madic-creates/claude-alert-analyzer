apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-alert-checkmk-analyzer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: claude-alert-checkmk-analyzer
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-alert-checkmk-analyzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-alert-checkmk-analyzer
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analyzer
          image: ghcr.io/madic-creates/claude-alert-checkmk-analyzer:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9101
              name: metrics
          envFrom:
            - secretRef:
                name: claude-alert-checkmk-analyzer-env
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: history
              mountPath: /var/lib/analyzer
            - name: ssh
              mountPath: /ssh
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: history
          persistentVolumeClaim:
            claimName: claude-alert-checkmk-analyzer-history
        - name: ssh
          secret:
            secretName: claude-alert-checkmk-analyzer-ssh
            defaultMode: 0400
