---
name: Build Analyzer Images

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/build.yaml"
      - ".semrelrc"
  workflow_dispatch:

# Concurrency is scoped per job, not workflow-wide. A workflow-level
# cancel-in-progress would cancel an *executing* release job when a newer
# commit lands; a cancel between "Publish Git tag + GitHub Release" and
# "Upload binaries to GitHub Release" leaves a tag that permanently lacks
# its binaries (the next run computes the *next* version and never heals it).
#
# Instead: test/lint/build cancel their own stale counterparts (see the
# per-job concurrency blocks), while release serializes across runs
# (cancel-in-progress: false) and relies on its staleness guard step to
# skip releasing from a commit that is no longer the main tip. That guard
# is what keeps go-semantic-release's "latest release" baseline an ancestor
# of HEAD when two rapid pushes (e.g. back-to-back Renovate merges) race.

# Default token scope for all jobs. Only the release job pushes to GHCR /
# creates releases; it declares its own permissions block.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-test
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-lint
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Compile both binaries
        run: |
          set -euo pipefail
          make binaries
          ls -la k8s-analyzer checkmk-analyzer
      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            k8s-analyzer
            checkmk-analyzer
          retention-days: 1
          if-no-files-found: error

  release:
    needs: [test, lint, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: .

      - name: Make binaries executable
        run: chmod +x k8s-analyzer checkmk-analyzer

      # Defence-in-depth against the concurrent-release race (see top-level
      # concurrency comment). If this run's commit is no longer the tip of main,
      # a newer run already owns the release — skip, so we never release from a
      # stale commit whose baseline would be a *descendant* (unreachable) commit.
      - name: Skip release if not the current main tip
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TIP="$(gh api "repos/${{ github.repository }}/commits/main" --jq .sha)"
          if [ "$TIP" != "${{ github.sha }}" ]; then
            echo "::notice::HEAD ${{ github.sha }} is no longer the main tip (${TIP}); skipping release."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pinned semantic-release binary
        if: steps.guard.outputs.proceed == 'true'
        run: |
          curl -fsSL \
            https://github.com/go-semantic-release/semantic-release/releases/download/v2.31.0/semantic-release_v2.31.0_linux_amd64 \
            -o /tmp/semantic-release
          chmod +x /tmp/semantic-release
          /tmp/semantic-release --version

      - name: Determine next version (dry-run)
        id: semrel-dry
        if: steps.guard.outputs.proceed == 'true'
        # go-semantic-release/action v1.24.1
        uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f
        with:
          bin: /tmp/semantic-release
          dry: true
          allow-initial-development-versions: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        if: steps.semrel-dry.outputs.version != ''
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.semrel-dry.outputs.version != ''
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags (k8s)
        if: steps.semrel-dry.outputs.version != ''
        id: meta-k8s
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/claude-alert-kubernetes-analyzer
          tags: |
            type=raw,value=v${{ steps.semrel-dry.outputs.version }}
            type=raw,value=${{ steps.semrel-dry.outputs.version }}
            type=raw,value=${{ steps.semrel-dry.outputs.version_major }}.${{ steps.semrel-dry.outputs.version_minor }}
            type=raw,value=latest

      - name: Build & push k8s-analyzer
        if: steps.semrel-dry.outputs.version != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          target: k8s-analyzer
          push: true
          # Without this, buildx wraps the single-arch image in an OCI index
          # plus an untagged provenance-attestation manifest. Those untagged
          # children confuse the GHCR cleanup workflow's retention logic and
          # add nothing for a plain single-platform image.
          provenance: false
          tags: ${{ steps.meta-k8s.outputs.tags }}
          labels: ${{ steps.meta-k8s.outputs.labels }}
          cache-from: type=gha,scope=alert-analyzer
          cache-to: type=gha,scope=alert-analyzer,mode=max

      - name: Compute image tags (checkmk)
        if: steps.semrel-dry.outputs.version != ''
        id: meta-checkmk
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/claude-alert-checkmk-analyzer
          tags: |
            type=raw,value=v${{ steps.semrel-dry.outputs.version }}
            type=raw,value=${{ steps.semrel-dry.outputs.version }}
            type=raw,value=${{ steps.semrel-dry.outputs.version_major }}.${{ steps.semrel-dry.outputs.version_minor }}
            type=raw,value=latest

      - name: Build & push checkmk-analyzer
        if: steps.semrel-dry.outputs.version != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          target: checkmk-analyzer
          push: true
          # See the k8s-analyzer push step: keep the pushed artifact a plain
          # manifest instead of an index with untagged attestation children.
          provenance: false
          tags: ${{ steps.meta-checkmk.outputs.tags }}
          labels: ${{ steps.meta-checkmk.outputs.labels }}
          cache-from: type=gha,scope=alert-analyzer
          cache-to: type=gha,scope=alert-analyzer,mode=max

      - name: Publish Git tag + GitHub Release
        if: steps.semrel-dry.outputs.version != ''
        # go-semantic-release/action v1.24.1
        uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f
        with:
          bin: /tmp/semantic-release
          allow-initial-development-versions: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename binaries + checksums for release
        if: steps.semrel-dry.outputs.version != ''
        env:
          VERSION: ${{ steps.semrel-dry.outputs.version }}
        run: |
          set -euo pipefail
          for COMPONENT in k8s-analyzer checkmk-analyzer; do
            OUT="${COMPONENT}-v${VERSION}-linux-amd64"
            mv "$COMPONENT" "$OUT"
            sha256sum "$OUT" > "${OUT}.sha256"
          done
          ls -la k8s-analyzer-* checkmk-analyzer-*

      - name: Upload binaries to GitHub Release
        if: steps.semrel-dry.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semrel-dry.outputs.version }}
        run: |
          gh release upload "v${VERSION}" \
            "k8s-analyzer-v${VERSION}-linux-amd64" \
            "k8s-analyzer-v${VERSION}-linux-amd64.sha256" \
            "checkmk-analyzer-v${VERSION}-linux-amd64" \
            "checkmk-analyzer-v${VERSION}-linux-amd64.sha256" \
            --clobber
